# livekit-agent-simulator config — this whole .agent-sim/ folder is gitignored.
# POC: paste credentials directly here. Do NOT commit this file.

project: my-voice-agent

livekit:
  url: "wss://YOUR-PROJECT.livekit.cloud"
  api_key: "APIxxxxxxxxxxxx"
  api_secret: "secretxxxxxxxxxxxxxxxxxxxxxxxx"
  # Must match agent_name registered with LiveKit (explicit dispatch).
  agent_name: "my-voice-agent-local"
  agent_join_timeout_ms: 25000
  # Opaque JSON string passed to LiveKit RoomAgentDispatch.metadata (project-specific keys).
  # Per-scenario override: add {"kind":"Dispatch","spec":{"metadata":"..."}} in *.jsonl
  # dispatch_metadata: '{"yourProjectKey":"value"}'

simulator:
  google_api_key: "AIzaxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  language: "en-US"
  voice:
    model: "gemini-3.1-flash-live-preview"
    voice: "Puck"
    language: "en-US"

judge:
  model: "gemini-2.5-flash"
  temperature: 0

observe:
  timezone: "UTC"
  lk_transcription: true
  # LiveKit Agents RemoteSession tools/state/usage (default true; disable for non-SDK agents).
  lk_agent_session: true
  # Local stereo WAV at reports/<run-id>/conversation.wav (L=sim, R=agent). No Egress.
  record_audio: true
  # Custom agent data topics (empty = record every topic the agent publishes):
  data_topics: []
  # Sim wire format: payload types treated as transcript turns on any data topic:
  transcript_payload_types:
    - "transcript_turn"
  transcript_dedupe_window_ms: 5000
  # Fallback for non-SDK custom data payloads (SDK tools are automatic above):
  tool_event_patterns: []
  # Consumer-specific observe/dispatch examples: docs/portability.md
  silence_threshold_ms: 4000
  turn_taking_warn_ms: 2500

# room_pcm library: package built-ins + per-target overrides (multi-repo).
# List: lk-sim cues --root .
# Scenario asset: "builtin:noise.loud" | "my.wav" in .agent-sim/cues/ | alias name
# cues:
#   dirs:
#     - shared-audio          # relative to project root (optional extra search dirs)
#   aliases:
#     office: office_loop.wav # short name → file under .agent-sim/cues/ or dirs

# Optional LiveKit SIP defaults for inbound_sip / outbound_sip / outbound_sim_callee.
# Mode is NEVER set here — use scenario {"kind":"Caller","spec":{"mode":"…"}} instead.
# See docs/telephony.md. Omit this whole block for WebRTC-only targets.
# telephony:
#   outbound_trunk_id: "ST_xxxxxxxxxxxx"   # CreateSIPParticipant trunk
#   inbound_trunk_id: "ST_yyyyyyyyyyyy"    # optional metadata / preflight
#   dial_in: "+15551234567"                # default agent inbound DID (inbound_sip)
#   sim_inbound_number: "+15559876543"     # Gemini callee DID (outbound_sim_callee only)
#   prepare_ms: 3000
#   wait_until_answered: true
#   krisp_enabled: false
#   handset_isolation: mute_and_unsubscribe  # outbound_sip after human answers
#   # agent_room: "fixed-inbound-room"     # optional if dispatch rule room is known
#   # agent_room_name_template: "call-{run_id}"
