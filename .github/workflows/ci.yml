name: CI

on:
  pull_request:
    branches:
      - main
      - main
  push:
    branches:
      - main
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -q

      - name: CLI smoke
        run: uv run --python ${{ matrix.python-version }} lk-sim --help

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-py312
          path: dist/*
          if-no-files-found: error

      - name: CI summary
        if: always()
        run: |
          {
            echo "## CI summary"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| pytest (3.10, 3.12) | required |"
            echo "| \`uv build\` | required |"
            echo "| artifact | \`dist-py312\` |"
          } >> "$GITHUB_STEP_SUMMARY"
