name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build report player
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Stage report player for wheel
        run: python scripts/bundle_report_player.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -q

      - name: CLI smoke
        run: uv run --python ${{ matrix.python-version }} lk-sim --help

  summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Write summary
        run: |
          {
            echo "## CI summary"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| report player (Vite) | required |"
            echo "| pytest (3.10, 3.12) | required |"
            echo "| lk-sim --help | required |"
            echo ""
            echo "Distribution: **git + uv/pipx** via install.sh / install.ps1 (no PyPI / wheel publish)."
          } >> "$GITHUB_STEP_SUMMARY"
